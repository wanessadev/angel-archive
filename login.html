    <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>
    <!-- Background Cozy -->
    <div class="cosmic-bg" aria-hidden="true">
        <div class="nebula-layer nebula-1"></div>
        <div class="nebula-layer nebula-2"></div>
        <div class="nebula-layer nebula-3"></div>
        <div class="nebula-layer nebula-4"></div>
    </div>

    <!-- Partículas decorativas -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Container principal -->
    <div class="login-page">
        <div class="login-wrapper">
            <div class="login-card">
                <!-- Avatar -->
                <div class="avatar-container">
                    <div class="avatar-circle">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                        </svg>
                    </div>
                    <h1 class="login-title">Bem-vinda de volta! 💫</h1>
                    <p class="login-subtitle">Entre no seu universo acolhedor</p>
                </div>

                <!-- Formulário -->
                <form id="loginForm" autocomplete="off" novalidate>
                    <div class="login-input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" class="login-input" placeholder="seu@email.com" required autocomplete="email">
                    </div>

                    <div class="login-input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" class="login-input" placeholder="••••••••" required autocomplete="current-password" minlength="6">
                    </div>

                    <div class="login-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember" checked>
                            <label for="remember">Lembrar de mim</label>
                        </div>
                        <a href="forgot.html" class="forgot-password">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="login-button" id="loginBtn">
                        Entrar no Archive ✨
                    </button>
                </form>

                <!-- Separador -->
                <div class="login-divider">
                    <div class="login-divider-line"></div>
                    <span class="login-divider-text">ou</span>
                    <div class="login-divider-line"></div>
                </div>

                <!-- Login Social -->
                <div class="social-login">
                    <button class="social-button" type="button" aria-label="Entrar com Google">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                    </button>
                    <button class="social-button" type="button" aria-label="Entrar com GitHub">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </button>
                </div>

                <!-- Rodapé -->
                <div class="login-footer">
                    <p>Ainda não tem uma conta? <a href="register.html">Criar conta 🌸</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast hidden" id="toast">
        <div class="toast-icon">✓</div>
        <span id="toastMessage">Login realizado com sucesso!</span>
    </div>

    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const loginBtn = document.getElementById('loginBtn');

            function showToast(message, type) {
                toastMessage.textContent = message;
                toast.classList.toggle('error', type === 'error');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }

            function setLoading(loading) {
                if (loading) {
                    loginBtn.innerHTML = 'Entrando... <span class="spinner"></span>';
                    loginBtn.disabled = true;
                    loginBtn.style.opacity = '0.85';
                    loginBtn.style.cursor = 'wait';
                } else {
                    loginBtn.innerHTML = 'Entrar no Archive ✨';
                    loginBtn.disabled = false;
                    loginBtn.style.opacity = '1';
                    loginBtn.style.cursor = 'pointer';
                }
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email) { showToast('Por favor, digite seu e-mail!', 'error'); document.getElementById('email').focus(); return; }
                if (!password) { showToast('Por favor, digite sua senha!', 'error'); document.getElementById('password').focus(); return; }
                if (password.length < 6) { showToast('A senha deve ter pelo menos 6 caracteres!', 'error'); return; }

                setLoading(true);
                setTimeout(() => {
                    const remember = document.getElementById('remember').checked;
                    const storage = remember ? localStorage : sessionStorage;
                    storage.setItem('angelnessa_session', JSON.stringify({ email: email, loggedIn: true, timestamp: Date.now() }));
                    showToast('Bem-vinda de volta ao seu archive! ✨');
                    setTimeout(() => window.location.href = 'index.html', 800);
                }, 1200);
            });

            // Animação nos inputs
            document.querySelectorAll('.login-input').forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'scale(1.01)';
                    this.parentElement.style.transition = 'transform 0.3s ease';
                });
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'scale(1)';
                });
            });

            // Efeito de digitação no título
            const title = document.querySelector('.login-title');
            const originalText = title.textContent;
            title.textContent = '';
            let i = 0;
            function typeWriter() {
                if (i < originalText.length) {
                    title.textContent += originalText.charAt(i);
                    i++;
                    setTimeout(typeWriter, 70);
                }
            }
            setTimeout(typeWriter, 500);

            // Auto-redirect se já logada
            const session = localStorage.getItem('angelnessa_session') || sessionStorage.getItem('angelnessa_session');
            const urlParams = new URLSearchParams(window.location.search);
            const fromLogout = urlParams.get('from') === 'logout';
            
            if (session && !fromLogout) {
                try {
                    const data = JSON.parse(session);
                    if (data.loggedIn && (Date.now() - data.timestamp) < 7 * 24 * 60 * 60 * 1000) {
                        window.location.href = 'index.html';
                    }
                } catch(e) {
                    localStorage.removeItem('angelnessa_session');
                    sessionStorage.removeItem('angelnessa_session');
                }
            }
        })();
    </script>
</body>
</html>
